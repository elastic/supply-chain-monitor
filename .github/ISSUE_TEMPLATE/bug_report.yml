name: Bug report
description: Report unexpected behavior or a crash
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill this out.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands you ran, config files (redact secrets), etc.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.11.6
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11, macOS 14, Ubuntu 22.04
  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: Relevant excerpt from logs/monitor_*.log or console (redact secrets).
      render: shell
